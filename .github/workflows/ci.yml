name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build and test
        working-directory: projects/macos-text-replacements
        run: |
          swift build
          swift test
          .build/debug/keypop inspect
